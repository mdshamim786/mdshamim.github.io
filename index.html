<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Md Shamim</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
color:white;
text-align:center;
}

/* 3 dot menu */

.menu{
position:fixed;
top:15px;
left:15px;
font-size:30px;
cursor:pointer;
z-index:1000;
}

.dropdown{
display:none;
position:fixed;
top:55px;
left:15px;
background:white;
color:black;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
overflow:hidden;
}

.dropdown a{
display:block;
padding:10px 20px;
text-decoration:none;
color:black;
}

.dropdown a:hover{
background:#eee;
}

/* main */

.container{
padding:40px;
}

img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid white;
}

.buttons{
margin-top:20px;
}

.btn{
display:block;
width:220px;
margin:15px auto;
padding:12px;
text-align:center;
color:white;
text-decoration:none;
border-radius:12px;
font-size:16px;
transition:0.3s;
}
/* Colors */
.whatsapp {
background: #25D366;
}

.instagram {
background: #E1306C;
}

.facebook {
background: #1877F2;
}

/* Animation */
.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.btn:active{
transform:scale(0.95);
}

</style>
</head>

<body>

<!-- 3 dot -->
<div class="menu" onclick="toggleMenu()">⋮</div>

<div class="dropdown" id="menu">
<a href="https://wa.me/917557096331">WhatsApp</a>
<a href="#">Instagram</a>
<a href="#">Facebook</a>
</div>

<div class="container">

<img src="shamim.jpg">

<h1>Md Shamim</h1>

<p>Welcome to my website</p>

<a class="btn whatsapp" href="https://wa.me/917557096331">WhatsApp</a>

<a class="btn instagram" href="#">Instagram</a>

<a class="btn facebook" href="#">Facebook</a>

</div>

<script>

function toggleMenu(){
var menu=document.getElementById("menu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}

}

</script>

</body>
</html>
