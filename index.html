<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md Shamim AI Website</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

/* animated gradient */

body{
background:linear-gradient(-45deg,#6a11cb,#2575fc,#ff512f,#dd2476);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
}

/* hero */

.hero{
text-align:center;
padding:60px 20px;
}

.profile{
width:160px;
height:160px;
border-radius:50%;
border:5px solid white;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
object-fit:cover;
}

.hero h1{
margin-top:15px;
font-size:40px;
}

.social{
margin-top:15px;
}

.social a{
margin:0 10px;
font-size:24px;
color:white;
}

/* chat button */

.chat-btn{
position:fixed;
bottom:30px;
right:30px;
background:#00e5ff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:black;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* chatbox */

.chatbox{
position:fixed;
bottom:100px;
right:30px;
width:320px;
background:white;
color:black;
border-radius:15px;
display:none;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.chat-header{
background:#2575fc;
color:white;
padding:12px;
border-radius:15px 15px 0 0;
}

.chat-body{
height:220px;
overflow:auto;
padding:10px;
font-size:14px;
}

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.chat-input button{
background:#2575fc;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

/* footer */

footer{
text-align:center;
padding:20px;
margin-top:50px;
opacity:0.8;
}

</style></head><body><header>
<div class="logo">Md Shamim</div>
</header><div class="hero"><img src="shamim.jpg" class="profile"><h1>Md Shamim</h1><p>AI Powered Website</p><div class="social">
<a href="https://wa.me/917557096331"><i class="fab fa-whatsapp"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-facebook"></i></a>
</div></div><footer>
© 2026 Md Shamim
</footer><!-- CHAT BUTTON --><div class="chat-btn" onclick="toggleChat()">
<i class="fa fa-robot"></i>
</div><!-- CHAT BOX --><div class="chatbox" id="chatbox"><div class="chat-header">ChatGPT Assistant</div><div class="chat-body" id="chatBody">
Hello 👋 Ask me anything.
</div><div class="chat-input">
<input id="userInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div></div><script>

const API_KEY="YOUR_OPENAI_API_KEY";

function toggleChat(){

let box=document.getElementById("chatbox");

box.style.display=box.style.display==="block"?"none":"block";

}

async function sendMessage(){

let input=document.getElementById("userInput").value;

let body=document.getElementById("chatBody");

body.innerHTML+="<br><b>You:</b> "+input;

document.getElementById("userInput").value="";

let response=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:"gpt-4.1-mini",

messages:[
{role:"user",content:input}
]

})

});

let data=await response.json();

let reply=data.choices[0].message.content;

body.innerHTML+="<br><b>AI:</b> "+reply;

body.scrollTop=body.scrollHeight;

}

</script></body>
</html>
